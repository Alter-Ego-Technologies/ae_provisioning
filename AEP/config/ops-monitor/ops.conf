# Ops Monitor global config

# Email routing (edit these!)
OPS_TO="ops@example.com"
OPS_FROM="server-alerts@example.com"
OPS_SUBJECT_PREFIX="[OPS]"

# Threshold check cadence (should match systemd timer interval)
CHECK_INTERVAL_MIN=5

# Minimum minutes between repeat alerts for the same ongoing WARN/CRIT
ALERT_COOLDOWN_MIN=60

# Disk % thresholds
DISK_WARN=80
DISK_CRIT=90

# Memory % thresholds
MEM_WARN=85
MEM_CRIT=95

# Load thresholds (multiplied by CPU cores)
LOAD_WARN_PER_CORE=1.5
LOAD_CRIT_PER_CORE=3.0

# CPU thresholds (approx avg window)
CPU_WARN=90
CPU_CRIT=97
CPU_WINDOW_MIN=10

# Required services (space-separated)
SERVICES="ssh cron"

# Optional: cert expiry checks
CERT_PATHS=""          # e.g. "/etc/letsencrypt/live/example.com/fullchain.pem"
CERT_WARN_DAYS=14
CERT_CRIT_DAYS=7

# Optional: backup heartbeat freshness
BACKUP_OK_FILE=""      # e.g. "/var/lib/backup/last_success"
BACKUP_WARN_HOURS=24
BACKUP_CRIT_HOURS=48

STATE_DIR="/var/lib/ops-monitor"
