# Nextcloud overlay - Docker-based file server
# Main containers
CONTAINERS="nextcloud_app_1 nextcloud_db"

# External volumes
NEXTCLOUD_DATA_VOLUME="nextcloud_data"
NEXTCLOUD_DB_VOLUME="nextcloud_db"

# SSL and custom configs
SSL_CONFIG_PATH="/opt/letsencrypt"
APACHE_SSL_CONF="/opt/nextcloud/apache/default-ssl.conf"

# Ports
NEXTCLOUD_PORTS="80 443"

# Optional: Add environment variables or secrets as needed
# MYSQL_ROOT_PASSWORD, MYSQL_DATABASE, MYSQL_USER, MYSQL_PASSWORD
# See docker-compose.yml for full details
