# Web overlay - LiteSpeed + CyberPanel (host-based, no containers)
# Core CyberPanel services (always running)
SERVICES="${SERVICES} lscpd lsws mariadb"

# No Docker containers (CyberPanel runs natively)
CONTAINERS=""

# Optional services - uncomment only if you've enabled them in CyberPanel:
 SERVICES="${SERVICES} postfix dovecot"     # Email server
# SERVICES="${SERVICES} named"               # PowerDNS/BIND
 SERVICES="${SERVICES} pure-ftpd"           # FTP server
 SERVICES="${SERVICES} redis-server"        # Redis cache

